<!DOCTYPE html>
<html>
<head>
    <title>CCM Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f5f5f5;
        }

        .nav {
            background: #222;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 10px;
        }

        .qr-btn {
            background: #4CAF50;
            color: white;
        }

        .send-btn {
            background: #2196F3;
            color: white;
        }

        .logout-btn {
            background: red;
            color: white;
        }

        #waStatus {
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>

<body>

<div class="nav">
    <h2>CCM Dashboard</h2>

    <button
        class="logout-btn"
        onclick="logout()">
        Logout
    </button>
</div>

<div class="container">

    <div class="card">

        <h3>User Information</h3>

        <p id="userInfo">
            Loading...
        </p>

    </div>

    <div class="card">

        <h3>WhatsApp Status</h3>

        <p id="waStatus">
            Checking...
        </p>

    </div>

    <div class="card">

        <h3>Actions</h3>

        <button
            class="qr-btn"
            onclick="openQR()">
            Link With Barcode
        </button>

        <button
            class="send-btn"
            onclick="openSendPage()">
            Send Message
        </button>

		<button
			class="send-btn"
			onclick="window.location.href='groups.html'">
			Groups
		</button>

    </div>

</div>

<script src="api.endpoints.js"></script>
<script>

/**
 * Decode JWT
 */
function parseJWT(token) {

    try {

        return JSON.parse(
            atob(
                token.split(".")[1]
            )
        );

    } catch {

        return null;

    }

}

/**
 * Check Login
 */
function checkAuth() {

    const token =
        localStorage.getItem("token");

    if (!token) {

        window.location.href =
            "login.html";

        return null;
    }

    const user =
        parseJWT(token);

    if (!user) {

        localStorage.removeItem("token");

        window.location.href =
            "login.html";

        return null;
    }

    return user;
}

/**
 * Open QR Page
 */
function openQR() {

    const token =
        localStorage.getItem("token");

    window.open(
        API.base + "/sessions/qr/page?token="
        + token,
        "_blank"
    );

}

/**
 * Open Send Page
 */
function openSendPage() {

    window.location.href =
        "send.html";

}

/**
 * Logout
 */
async function logout() {

    const token =
        localStorage.getItem("token");

    try {

        await fetch(
		API.base + API.auth.logout,
            {
                method: "POST",
                headers: {
                    Authorization:
                        "Bearer " + token
                }
            }
        );

    } catch (err) {

        console.log(err);

    }

    localStorage.removeItem("token");

    window.location.href =
        "login.html";

}

/**
 * WhatsApp Status
 */
async function checkWhatsAppStatus() {

    const token =
        localStorage.getItem("token");

    const el =
        document.getElementById(
            "waStatus"
        );

    try {

        const response =
            await fetch(
				API.base + API.whatsapp.status,
                {
                    headers: {
                        Authorization:
                            "Bearer " + token
                    }
                }
            );

        const data =
            await response.json();

        if (
            data.success &&
            data.ready
        ) {

            el.innerText =
                "Connected";

            el.style.color =
                "blue";

        } else {

            el.innerText =
                "Not Connected";

            el.style.color =
                "red";

        }

    } catch {

        el.innerText =
            "Not Connected";

        el.style.color =
            "red";

    }

}

/**
 * Init
 */
function init() {

    const user =
        checkAuth();

    if (!user)
        return;

    document.getElementById(
        "userInfo"
    ).innerHTML = `
        Name: ${user.name}<br>
        Email: ${user.email}<br>
        ID: ${user.id}
    `;

    checkWhatsAppStatus();

    setInterval(
        checkWhatsAppStatus,
        3000
    );

}

init();
</script>

</body>
</html>
