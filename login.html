<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            width: 320px;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: darkblue;
        }

        .msg {
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Login</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button id="loginBtn">Login</button>

    <div class="msg" id="msg"></div>

    <p>No account? <a href="signup.html">Sign up</a></p>
</div>

<!-- API ENDPOINTS -->
<script src="api.endpoints.js"></script>
<script>
/**
 * API CONFIG
 */

/**
 * LOGIN FUNCTION (GLOBAL FIX)
 */
window.login = async function () {

    const email =
        document.getElementById("email").value;

    const password =
        document.getElementById("password").value;

    const msg =
        document.getElementById("msg");

    const btn =
        document.getElementById("loginBtn");

    if (!email || !password) {
        msg.innerHTML = "⚠️ Please fill all fields";
        return;
    }

    try {

        btn.disabled = true;
        btn.innerText = "Logging in...";

        msg.innerHTML = "";

        const res = await fetch(
            API.base + API.auth.login,
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    email,
                    password
                })
            }
        );

        const data = await res.json();

        if (res.ok && data.success && data.token) {

            localStorage.setItem("token", data.token);

            msg.innerHTML = "✅ Login successful";

            setTimeout(() => {
                window.location.href = "home.html";
            }, 500);

            return;
        }

        msg.innerHTML =
            "❌ " + (data.error || data.message || "Invalid credentials");

    } catch (err) {

        msg.innerHTML =
            "❌ Network error: " + err.message;

    } finally {

        btn.disabled = false;
        btn.innerText = "Login";
    }
};

/**
 * Attach event safely (better than onclick)
 */
document.getElementById("loginBtn")
    .addEventListener("click", window.login);

</script>

</body>
</html>
