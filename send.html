<body>

<div class="header">
    <h2>WhatsApp Sender</h2>
</div>

<div class="container">

```
<label><b>Mode</b></label>

<select id="mode" onchange="changeMode()">
    <option value="message">Send Message</option>
    <option value="file">Send File</option>
</select>

<label><b>Phone Numbers</b></label>

<textarea
    id="phones"
    rows="8"
    placeholder="201129011577&#10;201029820039">
</textarea>

<div id="messageSection">

    <label><b>Message</b></label>

    <textarea
        id="message"
        rows="6"
        placeholder="Write your message here">
    </textarea>

</div>

<div id="fileSection">

    <label><b>Caption</b></label>

    <textarea
        id="caption"
        rows="4"
        placeholder="Write caption here">
    </textarea>

    <label><b>Attachment</b></label>

    <input
        type="file"
        id="attachment">

</div>

<button
    class="send-btn"
    onclick="submitData()">
    Send
</button>

<button
    class="home-btn"
    onclick="window.location.href='home.html'">
    Home
</button>

<div id="result"></div>
```

</div>

<!-- API ENDPOINTS -->
<script src="api.endpoints.js"></script>
<script>

function checkAuth() {

    const token =
        localStorage.getItem("token");

    if (!token) {

        window.location.href =
            "login.html";

    }

}

function changeMode() {

    const mode =
        document.getElementById("mode").value;

    document.getElementById(
        "messageSection"
    ).style.display =
        mode === "message"
            ? "block"
            : "none";

    document.getElementById(
        "fileSection"
    ).style.display =
        mode === "file"
            ? "block"
            : "none";

}

async function submitData() {

    const mode =
        document.getElementById("mode").value;

    if (mode === "message") {

        await sendMessage();

    } else {

        await sendFile();

    }

}

async function sendMessage() {

    const token =
        localStorage.getItem("token");

    const phones =
        document
            .getElementById("phones")
            .value
            .split("\n")
            .map(x => x.trim())
            .filter(x => x);

    const message =
        document
            .getElementById("message")
            .value;

    const result =
        document.getElementById("result");

    try {

        result.innerHTML =
            "Sending...";

        const response =
            await fetch(
				API.base + API.whatsapp.send,
                {
                    method: "POST",
                    headers: {
                        "Content-Type":
                            "application/json",
                        Authorization:
                            "Bearer " + token
                    },
                    body: JSON.stringify({
                        phones,
                        message
                    })
                }
            );

        const data =
            await response.json();

        if (data.success) {

            result.innerHTML =
                "Message sent successfully ✅";

            result.style.color =
                "blue";

        } else {

            result.innerHTML =
                data.error ||
                "Failed";

            result.style.color =
                "red";

        }

    } catch (err) {

        result.innerHTML =
            err.message;

        result.style.color =
            "red";

    }

}

async function sendFile() {

    const token =
        localStorage.getItem("token");

    const result =
        document.getElementById("result");

    const phones =
        document
            .getElementById("phones")
            .value
            .split("\n")
            .map(x => x.trim())
            .filter(x => x);

    const caption =
        document
            .getElementById("caption")
            .value;

    const file =
        document
            .getElementById("attachment")
            .files[0];

    if (!file) {

        result.innerHTML =
            "Please select a file";

        result.style.color =
            "red";

        return;

    }

    const formData =
        new FormData();

    formData.append(
        "caption",
        caption
    );

    formData.append(
        "attachment",
        file
    );

    phones.forEach(
        (phone, index) => {

            formData.append(
                `phones[${index}]`,
                phone
            );

        }
    );

    try {

        result.innerHTML =
            "Uploading...";

        const response =
            await fetch(
				API.base + API.whatsapp.sendFile,
                {
                    method: "POST",
                    headers: {
                        Authorization:
                            "Bearer " + token
                    },
                    body: formData
                }
            );

        const data =
            await response.json();

        if (data.success) {

            result.innerHTML =
                "File sent successfully ✅";

            result.style.color =
                "blue";

        } else {

            result.innerHTML =
                data.error ||
                "Failed";

            result.style.color =
                "red";

        }

    } catch (err) {

        result.innerHTML =
            err.message;

        result.style.color =
            "red";

    }

}

checkAuth();
changeMode();

</script>

</body>
</html>
